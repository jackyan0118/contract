version: '3.8'

services:
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: contract-app
    ports:
      - "8000:8000"
    volumes:
      - ../../config:/app/config:ro
      - contract-output:/app/output
    environment:
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DATABASE_DSN=${ORACLE_DSN}
      - DATABASE_MIN_CONNECTIONS=${DATABASE_MIN_CONNECTIONS:-2}
      - DATABASE_MAX_CONNECTIONS=${DATABASE_MAX_CONNECTIONS:-10}
      - DATABASE_CONNECT_TIMEOUT=${DATABASE_CONNECT_TIMEOUT:-30}
      - DATABASE_COMMAND_TIMEOUT=${DATABASE_COMMAND_TIMEOUT:-60}
      - LOGGING_LEVEL=${LOGGING_LEVEL:-DEBUG}
      - TEMPLATE_PATH=/app/templates
      - TEMPLATE_OUTPUT_DIR=/app/output
      - DOWNLOADS_STORAGE_DIR=/app/output/downloads
      - DOWNLOADS_BASE_URL=${DOWNLOADS_BASE_URL:-http://localhost:8000}
      - DOWNLOADS_URL_PATH=/static/downloads
      - DOWNLOADS_EXPIRES_IN=86400
      - DOWNLOADS_DISK_SPACE_THRESHOLD=80
      - SECURITY_API_KEYS=${SECURITY_API_KEYS:-[]}
      - ORACLE_INSTANT_CLIENT=/opt/oracle/instantclient
    env_file:
      - .env
    networks:
      - contract-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: contract-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - contract-output:/app/output:ro
    networks:
      - contract-network
    depends_on:
      - app
    restart: unless-stopped

networks:
  contract-network:
    driver: bridge

volumes:
  contract-output:
