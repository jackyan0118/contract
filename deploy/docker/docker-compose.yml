services:
  app:
    image: docker-app:latest
    container_name: contract-app
    expose:
      - "8000"
    volumes:
      - ../../config:/app/config:ro
      - contract-output:/app/output
    environment:
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DATABASE_DSN=${ORACLE_DSN}
      - DATABASE_MIN_CONNECTIONS=${DATABASE_MIN_CONNECTIONS:-5}
      - DATABASE_MAX_CONNECTIONS=${DATABASE_MAX_CONNECTIONS:-20}
      - DATABASE_CONNECT_TIMEOUT=${DATABASE_CONNECT_TIMEOUT:-30}
      - DATABASE_COMMAND_TIMEOUT=${DATABASE_COMMAND_TIMEOUT:-60}
      - LOGGING_LEVEL=${LOGGING_LEVEL:-INFO}
      - TEMPLATE_PATH=${TEMPLATE_PATH:-config/templates}
      - TEMPLATE_OUTPUT_DIR=/app/output
      - DOWNLOADS_STORAGE_DIR=/app/output/downloads
      - DOWNLOADS_BASE_URL=${DOWNLOADS_BASE_URL:-http://localhost:80}
      - DOWNLOADS_URL_PATH=/static/downloads
      - DOWNLOADS_EXPIRES_IN=86400
      - DOWNLOADS_DISK_SPACE_THRESHOLD=80
      - SECURITY_API_KEYS=${SECURITY_API_KEYS:-[{"key":"sk_dev_test123","name":"开发环境","enabled":true}]}
      - ORACLE_INSTANT_CLIENT=/opt/oracle/instantclient
    env_file:
      - .env
    networks:
      - contract-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: contract-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - contract-output:/app/output:ro
    networks:
      - contract-network
    depends_on:
      - app
    restart: always

networks:
  contract-network:
    driver: bridge

volumes:
  contract-output:
