services:
  app:
    image: docker-app:latest
    container_name: contract-app
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - contract-output:/app/output
    environment:
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DATABASE_DSN=${ORACLE_DSN}
      - DATABASE_MIN_CONNECTIONS=${DATABASE_MIN_CONNECTIONS:-5}
      - DATABASE_MAX_CONNECTIONS=${DATABASE_MAX_CONNECTIONS:-20}
      - DATABASE_CONNECT_TIMEOUT=${DATABASE_CONNECT_TIMEOUT:-30}
      - DATABASE_COMMAND_TIMEOUT=${DATABASE_COMMAND_TIMEOUT:-60}
      - LOGGING_LEVEL=${LOGGING_LEVEL:-INFO}
      - TEMPLATE_PATH=${TEMPLATE_PATH:-config/templates}
      - TEMPLATE_OUTPUT_DIR=/app/output
      - DOWNLOADS_STORAGE_DIR=/app/output/downloads
      - DOWNLOADS_URL_PATH=/static/downloads
      - DOWNLOADS_BASE_URL=http://192.168.20.162:8000
      - SECURITY_API_KEYS=${SECURITY_API_KEYS}
      - ORACLE_INSTANT_CLIENT=/opt/oracle/instantclient
      - WEAVER_ENABLED=${WEAVER_ENABLED:-true}
      - WEAVER_SYSTEM_ID=${WEAVER_SYSTEM_ID:-SalesContract_PriceUrl_Update}
      - WEAVER_PASSWORD=${WEAVER_PASSWORD:-weaver2025}
      - WEAVER_OPERATOR_ID=${WEAVER_OPERATOR_ID:-5288}
      - WEAVER_HOSTS=${WEAVER_HOSTS:-["172.16.14.6:8080","172.16.14.19:8080"]}
    env_file:
      - .env
    networks:
      - contract-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  contract-network:
    driver: bridge

volumes:
  contract-output:
