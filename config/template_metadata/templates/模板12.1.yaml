      value: '24'
    - field: DJZ
      operator: in
      value:
      - '82'
      - '46'
    - field: SFJC
      operator: '='
      value: '0'
    - field: BNGHJLXZ
      operator: '='
      value: '5'

dedup_rules:
- name: 产品名称
  field: WLMS

table:
  columns:
  - name: 序号
    type: auto_number
  - name: 产品名称
    source_field: WLMS
    source_table: UF_HTJGKST_DT1
  - name: 供货价
    source_field: GHJY
    source_table: UF_HTJGKST_DT1
    transform: currency
    params:
      decimals: 2
  placeholders:
    start: '{{#明细表}}'
    end: '{{/明细表}}'

speeches:
- id: 话术1
  type: fixed
  content: '注：前述试剂中标价格，以江西省医疗保障局发布的《关于公布肾功和心肌酶生化类检测试剂省际联盟集中带量采购中选结果的通知》（具体网址为http://ybj.jiangxi.gov.cn/art/2024/3/5/art_28422_4805725.html）附件2：肾功和心肌酶生化类检测试剂省际联盟集中带量采购产品供应清单中所列的中选价为准。'

