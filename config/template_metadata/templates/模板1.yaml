# 模板1：KHB、科华生物品牌酶免&胶体金产品供货价
# 模板ID: 模板1
# 更新日期: 2026-03-10

id: "模板1"
name: "KHB、科华生物品牌酶免&胶体金产品供货价"
file: "templates/模板1：KHB、科华生物品牌酶免&胶体金产品供货价.docx"
category: "酶免胶体金"

# ============================================================
# Phase 4: 模板匹配条件
# 用于确定使用哪些模板
# ============================================================
match_conditions:
  产品细分:
    - "酶免试剂"
    - "胶体金试剂"

# ============================================================
# Phase 5: 明细表数据筛选规则
# 从报价单明细中筛选符合条件的数据填充到模板
# ============================================================
detail_filter:
  description: "当产品细分为酶免试剂或胶体金试剂时"
  conditions:
    - field: "CPXF"
      operator: "in"
      value: ["酶免试剂", "胶体金试剂"]

# ============================================================
# 表格配置
# ============================================================
table:
  # 占位符标记
  placeholders:
    start: "{{#明细表}}"
    end: "{{/明细表}}"

  # 列配置 (顺序与模板表格一致)
  columns:
    - name: "产品类别"
      source_field: "CPXF"
      source_table: "UF_HTJGKST_DT1"
      description: "产品细分"

    - name: "序号"
      type: "auto_number"
      description: "自动编号"

    - name: "物料编码"
      source_field: "WLDM"
      source_table: "UF_HTJGKST_DT1"
      description: "物料代码"

    - name: "品名"
      source_field: "WLMS"
      source_table: "UF_HTJGKST_DT1"
      description: "物料描述"

    - name: "规格型号"
      source_field: "GG"
      source_table: "UF_HTJGKST_DT1"
      description: "规格"

    - name: "供货价"
      source_field: "GHJY"
      source_table: "UF_HTJGKST_DT1"
      description: "供货价_元"
      format:
        type: "currency"
        decimal_places: 2

# 段落占位符
paragraph_placeholders:
  标题:
    value: "KHB、科华生物品牌酶免&胶体金产品供货价"
  金额单位:
    value: "元"

# 话术配置
speeches:
  - id: "话术1"
    name: "新上市通知"
    type: "fixed"
    position: "after_table"
    content: |
      新上市的产品价格另行通知。
