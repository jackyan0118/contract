id: 模板4.1
name: 通用生化（江西糖代谢）产品价格-集采中标价
file: 模板4.1：通用生化（江西糖代谢）产品价格-集采中标价.docx
category: 集采产品
paragraph_placeholders:
  标题: 江西糖代谢通用生化产品供货价
  金额单位: 元

detail_filter:
  condition_groups:
  - conditions:
    - field: CPXF_BM
      operator: '='
      value: '21'
    - field: DJZ
      operator: in
      value:
      - '69'
      - '87'
      - '70'
      - '91'
    - field: SFJC
      operator: '='
      value: '0'
    - field: BNGHJLXZ
      operator: '='
      value: '5'

dedup_rules:
- name: 产品名称
  field: WLMS

table:
  columns:
  - name: 序号
    type: auto_number
  - name: 产品名称
    source_field: WLMS
    source_table: UF_HTJGKST_DT1
  - name: 供货价
    source_field: GHJY
    source_table: UF_HTJGKST_DT1
    transform: currency
    params:
      decimals: 2
  placeholders:
    start: '{{#明细表}}'
    end: '{{/明细表}}'

speeches:
- id: 话术1
  type: fixed
  content: '注：前述试剂中标价格，以江西省医疗保障局发布的《关于公布糖代谢等生化类检测试剂省际联盟集中带量采购中选结果的通知》（具体网址为http://ybj.jiangxi.gov.cn/jxsylbzj/col/col27614/content/content_1878122518587604992.html）'

product_matching:
  field: WLMS
  products:
    - name: 糖化白蛋白测定试剂盒（酶法）
      seq: 1
    - name: 小而密低密度脂蛋白胆固醇测定试剂盒(过氧化物酶法)
      seq: 2
    - name: 载脂蛋白A1测定试剂盒（免疫透射比浊法）
      seq: 3
    - name: 载脂蛋白B测定试剂盒（免疫透射比浊法）
      seq: 4
    - name: 脂蛋白(a)测定试剂盒（胶乳免疫比浊法）
      seq: 5
    - name: 脂蛋白（a）测定试剂盒（粒子增强免疫比浊法）
      seq: 6
    - name: β-羟丁酸测定试剂盒(酶法)
      seq: 7
    - name: 天门冬氨酸氨基转移酶线粒体同工酶测定试剂盒（免疫抑制法）
      seq: 8
    - name: 游离脂肪酸测定试剂盒（酶法）
      seq: 9
    - name: 载脂蛋白E测定试剂盒（胶乳增强免疫比浊法）
      seq: 10
    - name: α-淀粉酶测定试剂盒(EPS底物法)
      seq: 11
    - name: 脂肪酶测定试剂盒(速率法)
      seq: 12
    - name: 钙（Ca）测定试剂盒（偶氮胂III法）
      seq: 13
    - name: 甘氨酰脯氨酸二肽氨基肽酶测定试剂盒(速率法)
      seq: 14
    - name: 镁测定试剂盒（二甲苯胺蓝法）
      seq: 15
    - name: 尿转铁蛋白测定试剂盒（胶乳免疫比浊法）
      seq: 16
    - name: 葡萄糖（GLU）测定试剂盒（己糖激酶法）
      seq: 17
    - name: 葡萄糖测定试剂盒（氧化酶法）
      seq: 18
    - name: 无机磷测定试剂盒（紫外直接法）
      seq: 19
    - name: 胰淀粉酶测定试剂盒(免疫抑制-EPS底物法)
      seq: 20

discount_templates: 
- seq_range: [1, 2, 3, 4, 5, 6]
  template: "糖代谢等生化类检测试剂省际联盟集中带量采购中选结果中的试剂对应相应规格产品的中标价（下称“中标价”）*【62】%"
- seq_range: [7, 8, 9, 10, 11, 12]
  template: "中标价*【65】%"
- seq_range: [13, 14, 15, 16, 17, 18, 19, 20]
  template: "中标价*【70】%"