id: 模板7.2
name: 卓越生化（江西糖代谢）产品价格-集采经销价
file: 模板7.2：卓越生化（江西糖代谢）产品价格-集采经销价.docx
category: 集采产品
detail_filter:
  condition_groups:
  - conditions:
    - field: CPXF_BM
      operator: '='
      value: '22'

    name: CPXF=卓越生化试剂
  - conditions:
    - field: DJZMC
      operator: in
      value:
      - 卓越生化-毫升-江西糖代谢
      - 卓越生化-毫升-江西糖代谢-含校准质控
    name: DJZMC=卓越生化-毫升-江西糖代谢
  - conditions:
    - field: SFJC
      operator: '='
      value: 1
    name: SFJC=1
  - conditions:
    - field: BNGHJLX
      operator: '='
      value: 集采经销价
    name: BNGHJLX=集采经销价
  description: ''
table:
  placeholders:
    start: '{{#明细表}}'
    end: '{{/明细表}}'
  columns:
  - name: 序号
    type: auto_number
  - name: 产品名称
    source_field: WLMS
    source_table: UF_HTJGKST_DT1
  - name: 供货价
    source_field: GHJY
    source_table: UF_HTJGKST_DT1
    format:
      type: currency
      decimal_places: 2
paragraph_placeholders:
  金额单位: 元
speeches:
- id: 话术1
  type: fixed
  position: after_table
  content: '注：前述试剂中标价格，以江西省医疗保障局发布的《关于公布糖代谢等生化类检测试剂省际联盟集中带量采购中选结果的通知》（具体网址为http://ybj.jiangxi.gov.cn/jxsylbzj/col/col27614/content/content_1878122518587604992.html）'
# 折扣话术模板（用于单元格合并时显示折扣信息）
